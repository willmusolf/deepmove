name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  frontend-ci:
    name: Frontend — TypeCheck + Test + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

  backend-ci:
    name: Backend — Lint + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: deepmove_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: python -m ruff check app/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deepmove_test
          ANTHROPIC_API_KEY: ""
          ENVIRONMENT: test
          SECRET_KEY: ci-test-secret-key-not-for-production

  backend-deploy:
    name: Backend — Deploy to Render
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'

      - name: Trigger Render deploy hook
        if: steps.changes.outputs.backend == 'true' && env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Skip deploy when backend is unchanged
        if: steps.changes.outputs.backend != 'true'
        run: echo "No backend changes in this push; skipping Render deploy."

      - name: Warn when deploy hook secret is missing
        if: steps.changes.outputs.backend == 'true' && env.RENDER_DEPLOY_HOOK_URL == ''
        run: |
          echo "RENDER_DEPLOY_HOOK_URL is not configured."
          echo "Add the Render deploy hook URL as a GitHub Actions repository secret to enable automatic backend deploys."
