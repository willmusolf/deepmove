name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  frontend-ci:
    name: Frontend — TypeCheck + Test + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

  backend-ci:
    name: Backend — Lint + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: deepmove_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: python -m ruff check app/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deepmove_test
          ANTHROPIC_API_KEY: ""
          ENVIRONMENT: test
          SECRET_KEY: ci-test-secret-key-not-for-production

  backend-deploy:
    name: Backend — Deploy to Render
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'

      - name: Trigger Render deploy hook
        if: steps.changes.outputs.backend == 'true' && env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Skip deploy when backend is unchanged
        if: steps.changes.outputs.backend != 'true'
        run: echo "No backend changes in this push; skipping Render deploy."

      - name: Warn when deploy hook secret is missing
        if: steps.changes.outputs.backend == 'true' && env.RENDER_DEPLOY_HOOK_URL == ''
        run: |
          echo "RENDER_DEPLOY_HOOK_URL is not configured."
          echo "Add the Render deploy hook URL as a GitHub Actions repository secret to enable automatic backend deploys."

  production-smoke:
    name: Production — Smoke Check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend-ci, backend-ci, backend-deploy]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect backend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'

      - name: Wait for deploys to settle
        run: sleep 90

      - name: Check frontend homepage
        run: |
          curl --fail --silent --show-error --location \
            --max-time 20 \
            https://www.deepmove.io > /dev/null

      - name: Check backend health
        run: |
          curl --fail --silent --show-error \
            --max-time 20 \
            https://api.deepmove.io/health | tee /tmp/deepmove-health.json
          grep -q '"status":"ok"' /tmp/deepmove-health.json

      - name: Note backend deploy expectation
        if: steps.changes.outputs.backend != 'true'
        run: echo "No backend files changed in this push; the backend deploy hook was not expected to fire."

  staging-deploy:
    name: Staging — Deploy to Render
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    env:
      RENDER_STAGING_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'

      - name: Trigger Render staging deploy hook
        if: steps.changes.outputs.backend == 'true' && env.RENDER_STAGING_DEPLOY_HOOK_URL != ''
        run: curl --fail --silent --show-error --request POST "$RENDER_STAGING_DEPLOY_HOOK_URL"

      - name: Skip deploy when backend is unchanged
        if: steps.changes.outputs.backend != 'true'
        run: echo "No backend changes in this push; skipping staging Render deploy."

      - name: Warn when staging deploy hook secret is missing
        if: steps.changes.outputs.backend == 'true' && env.RENDER_STAGING_DEPLOY_HOOK_URL == ''
        run: |
          echo "RENDER_STAGING_DEPLOY_HOOK_URL is not configured."
          echo "Add the staging Render deploy hook URL as a GitHub Actions repository secret to enable automatic staging deploys."

  staging-smoke:
    name: Staging — Smoke Check
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs: [frontend-ci, backend-ci, staging-deploy]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Wait for staging deploys to settle
        run: sleep 90

      - name: Check staging backend health
        run: |
          curl --fail --silent --show-error \
            --max-time 20 \
            https://staging-api.deepmove.io/health | tee /tmp/deepmove-staging-health.json
          grep -q '"status":"ok"' /tmp/deepmove-staging-health.json
