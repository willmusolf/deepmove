name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  frontend-ci:
    name: Frontend — TypeCheck + Test + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: TypeScript check
        run: npm run typecheck

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

  backend-ci:
    name: Backend — Lint + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: deepmove_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          python -m pip_audit -r requirements.txt

      - name: Lint with ruff
        run: python -m ruff check app/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deepmove_test
          ANTHROPIC_API_KEY: ""
          ENVIRONMENT: test
          SECRET_KEY: ci-test-secret-key-not-for-production

  backend-deploy:
    name: Backend — Deploy to Render
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'

      - name: Trigger Render deploy hook
        if: steps.changes.outputs.backend == 'true' && env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Skip deploy when backend is unchanged
        if: steps.changes.outputs.backend != 'true'
        run: echo "No backend changes in this push; skipping Render deploy."

      - name: Warn when deploy hook secret is missing
        if: steps.changes.outputs.backend == 'true' && env.RENDER_DEPLOY_HOOK_URL == ''
        run: |
          echo "RENDER_DEPLOY_HOOK_URL is not configured."
          echo "Add the Render deploy hook URL as a GitHub Actions repository secret to enable automatic backend deploys."

  production-smoke:
    name: Production — Smoke Check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend-ci, backend-ci, backend-deploy]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect backend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'

      - name: Check frontend homepage
        run: |
          curl --fail --silent --show-error --location \
            --max-time 20 \
            https://www.deepmove.io > /dev/null

      - name: Wait for production backend deploy to go live
        if: steps.changes.outputs.backend == 'true'
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          for attempt in $(seq 1 36); do
            if curl --fail --silent --show-error \
              --max-time 20 \
              https://api.deepmove.io/health/deep > /tmp/deepmove-health.json \
              && curl --fail --silent --show-error \
                --max-time 20 \
                https://api.deepmove.io/version > /tmp/deepmove-version.json \
              && python - <<'PY'
          import json
          import os

          health = json.load(open('/tmp/deepmove-health.json'))
          version = json.load(open('/tmp/deepmove-version.json'))
          assert health["status"] == "ok", health
          assert health["checks"]["database"] == "ok", health
          assert version["commit_sha"] == os.environ["EXPECTED_SHA"], version
          PY
            then
              exit 0
            fi
            sleep 10
          done
          echo "Production backend did not reach the expected healthy commit in time."
          exit 1

      - name: Check production backend health only
        if: steps.changes.outputs.backend != 'true'
        run: |
          for attempt in $(seq 1 18); do
            if curl --fail --silent --show-error \
              --max-time 20 \
              https://api.deepmove.io/health/deep > /tmp/deepmove-health.json \
              && python - <<'PY'
          import json

          payload = json.load(open('/tmp/deepmove-health.json'))
          assert payload["status"] == "ok", payload
          assert payload["checks"]["database"] == "ok", payload
          PY
            then
              exit 0
            fi
            sleep 10
          done
          echo "Production backend did not stay healthy long enough for smoke validation."
          exit 1

      - name: Note backend deploy expectation
        if: steps.changes.outputs.backend != 'true'
        run: echo "No backend files changed in this push; backend smoke skipped deploy-version waiting."

  staging-deploy:
    name: Staging — Deploy to Render
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    env:
      RENDER_STAGING_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'

      - name: Trigger Render staging deploy hook
        if: steps.changes.outputs.backend == 'true' && env.RENDER_STAGING_DEPLOY_HOOK_URL != ''
        run: curl --fail --silent --show-error --request POST "$RENDER_STAGING_DEPLOY_HOOK_URL"

      - name: Skip deploy when backend is unchanged
        if: steps.changes.outputs.backend != 'true'
        run: echo "No backend changes in this push; skipping staging Render deploy."

      - name: Warn when staging deploy hook secret is missing
        if: steps.changes.outputs.backend == 'true' && env.RENDER_STAGING_DEPLOY_HOOK_URL == ''
        run: |
          echo "RENDER_STAGING_DEPLOY_HOOK_URL is not configured."
          echo "Add the staging Render deploy hook URL as a GitHub Actions repository secret to enable automatic staging deploys."

  staging-smoke:
    name: Staging — Smoke Check
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs: [frontend-ci, backend-ci, staging-deploy]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect backend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'

      - name: Wait for staging backend deploy to go live
        if: steps.changes.outputs.backend == 'true'
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          for attempt in $(seq 1 36); do
            if curl --fail --silent --show-error \
              --max-time 20 \
              https://staging-api.deepmove.io/health/deep > /tmp/deepmove-staging-health.json \
              && curl --fail --silent --show-error \
                --max-time 20 \
                https://staging-api.deepmove.io/version > /tmp/deepmove-staging-version.json \
              && python - <<'PY'
          import json
          import os

          health = json.load(open('/tmp/deepmove-staging-health.json'))
          version = json.load(open('/tmp/deepmove-staging-version.json'))
          assert health["status"] == "ok", health
          assert health["checks"]["database"] == "ok", health
          assert version["commit_sha"] == os.environ["EXPECTED_SHA"], version
          PY
            then
              exit 0
            fi
            sleep 10
          done
          echo "Staging backend did not reach the expected healthy commit in time."
          exit 1

      - name: Check staging backend health only
        if: steps.changes.outputs.backend != 'true'
        run: |
          for attempt in $(seq 1 18); do
            if curl --fail --silent --show-error \
              --max-time 20 \
              https://staging-api.deepmove.io/health/deep > /tmp/deepmove-staging-health.json \
              && python - <<'PY'
          import json

          payload = json.load(open('/tmp/deepmove-staging-health.json'))
          assert payload["status"] == "ok", payload
          assert payload["checks"]["database"] == "ok", payload
          PY
            then
              exit 0
            fi
            sleep 10
          done
          echo "Staging backend did not stay healthy long enough for smoke validation."
          exit 1

      - name: Note backend deploy expectation
        if: steps.changes.outputs.backend != 'true'
        run: echo "No backend files changed in this push; backend smoke skipped deploy-version waiting."
